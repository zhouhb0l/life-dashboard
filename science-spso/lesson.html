<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science SPSO Lesson</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --surface: rgba(255, 255, 255, 0.92);
      --paper: #ffffff;
      --ink: #1d2730;
      --muted: #5e6b76;
      --accent: #177e75;
      --accent-strong: #0f5d57;
      --blue: #2d6f95;
      --warm: #d26a3a;
      --gold: #c4912f;
      --violet: #6a5da8;
      --line: rgba(29, 39, 48, 0.14);
      --shadow: 0 16px 42px rgba(29, 39, 48, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        linear-gradient(135deg, rgba(23, 126, 117, 0.12), transparent 30%),
        linear-gradient(315deg, rgba(210, 106, 58, 0.13), transparent 30%),
        var(--bg);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    a {
      color: var(--accent-strong);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      gap: 22px;
      align-items: center;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 10px;
      color: var(--warm);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5.6vw, 4rem);
      line-height: 1;
    }

    .intro,
    p,
    li {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.62;
    }

    .intro {
      max-width: 740px;
      margin: 0;
      font-size: 1.06rem;
    }

    .source-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(23, 126, 117, 0.2);
      border-radius: 999px;
      color: var(--accent-strong);
      background: rgba(238, 247, 243, 0.78);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .visual {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .visual svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .caption {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .side {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 14px;
    }

    .panel,
    .section-card,
    .check-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
    }

    .panel h2,
    .section-card h2,
    .check-card h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
    }

    .toc {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .toc a {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--accent-strong);
      background: rgba(238, 247, 243, 0.68);
      font-size: 0.92rem;
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .section-card {
      padding: 22px;
    }

    .section-card h2 {
      font-size: clamp(1.28rem, 2.8vw, 1.95rem);
    }

    .section-card p {
      margin: 0 0 12px;
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li + li {
      margin-top: 8px;
    }

    .term-grid,
    .check-grid,
    .page-flow {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .term-grid {
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    }

    .term,
    .flow-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
    }

    .term strong,
    .flow-item strong {
      color: var(--accent-strong);
    }

    .flow-item {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .flow-item span {
      display: inline-grid;
      place-items: center;
      min-height: 34px;
      border-radius: 8px;
      color: #ffffff;
      background: var(--blue);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .formula {
      margin-top: 12px;
      padding: 16px;
      border-left: 5px solid var(--warm);
      border-radius: 10px;
      color: #5f4636;
      background: #fff7ef;
      font-weight: 800;
    }

    .check-card {
      padding: 18px;
    }

    .check-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .check {
      padding: 14px;
      border-radius: 10px;
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .check strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent-strong);
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 6px;
    }

    .nav-row a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid rgba(23, 126, 117, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
    }

    @media (max-width: 860px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 540px) {
      .wrap {
        padding-top: 24px;
      }

      .section-card {
        padding: 18px;
      }

      .flow-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="./">Science SPSO</a>
      <a href="../">Dashboard</a>
    </nav>

    <div id="lessonRoot"></div>
  </div>

  <script src="./lessons.js"></script>
  <script>
    const root = document.getElementById("lessonRoot");

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char];
      });
    }

    function currentSlug() {
      const hash = window.location.hash.replace(/^#/, "");
      return hash || LESSONS[0].slug;
    }

    function findLesson() {
      return LESSONS.find(function (lesson) {
        return lesson.slug === currentSlug();
      }) || LESSONS[0];
    }

        biochem: `<svg viewBox="0 0 620 360" role="img"><rect x="24" y="24" width="572" height="312" rx="28" fill="#eef7f3"/><g stroke="#5e6b76" stroke-width="7" stroke-linecap="round"><line x1="160" y1="184" x2="238" y2="128"/><line x1="238" y1="128" x2="330" y2="186"/><line x1="330" y1="186" x2="438" y2="126"/><line x1="330" y1="186" x2="404" y2="260"/></g><g fill="#177e75"><circle cx="160" cy="184" r="28"/><circle cx="238" cy="128" r="28"/><circle cx="330" cy="186" r="28"/><circle cx="438" cy="126" r="28"/><circle cx="404" cy="260" r="28"/></g><text x="72" y="70" fill="#0f5d57" font-size="28" font-weight="900">${label}</text><text x="96" y="318" fill="#5e6b76" font-size="22">Biomolecules build bodies and store usable energy.</text></svg>`,
        exam: `<svg viewBox="0 0 620 360" role="img"><rect x="24" y="24" width="572" height="312" rx="28" fill="#fff7ef"/><rect x="176" y="72" width="268" height="232" rx="18" fill="#fff" stroke="#177e75" stroke-width="8"/><g stroke="#5e6b76" stroke-width="6" stroke-linecap="round"><path d="M224 138 h158"/><path d="M224 184 h158"/><path d="M224 230 h104"/></g><circle cx="206" cy="138" r="10" fill="#d26a3a"/><circle cx="206" cy="184" r="10" fill="#d26a3a"/><circle cx="206" cy="230" r="10" fill="#d26a3a"/><text x="72" y="70" fill="#0f5d57" font-size="28" font-weight="900">${label}</text><text x="118" y="326" fill="#5e6b76" font-size="22">Practice under timed multiple-choice conditions.</text></svg>`,
        electricity: `<svg viewBox="0 0 620 360" role="img"><rect x="24" y="24" width="572" height="312" rx="28" fill="#f1f7fb"/><path d="M168 114 h284 v170 h-284z" fill="none" stroke="#177e75" stroke-width="10" stroke-linejoin="round"/><circle cx="310" cy="114" r="34" fill="#fff" stroke="#d26a3a" stroke-width="8"/><path d="M294 114 h32" stroke="#d26a3a" stroke-width="8" stroke-linecap="round"/><path d="M310 98 v32" stroke="#d26a3a" stroke-width="8" stroke-linecap="round"/><circle cx="452" cy="198" r="38" fill="#fff7ef" stroke="#2d6f95" stroke-width="8"/><path d="M426 224 l52 -52" stroke="#2d6f95" stroke-width="7"/><text x="72" y="70" fill="#0f5d57" font-size="28" font-weight="900">${label}</text><text x="92" y="326" fill="#5e6b76" font-size="22">Voltage drives current through a complete circuit.</text></svg>`
      };
      return visuals[kind] || visuals.exam;
    }

    function renderLesson(lesson) {
      document.title = lesson.label + ": " + lesson.title;
      const index = LESSONS.indexOf(lesson);
      const previous = LESSONS[index - 1];
      const next = LESSONS[index + 1];
      const sectionLinks = lesson.sections.map(function (section, sectionIndex) {
        return `<li><a href="#section-${sectionIndex + 1}">${esc(section.title)}</a></li>`;
      }).join("");

      root.innerHTML = `
        <header class="hero">
          <div>
            <span class="eyebrow">${esc(lesson.label)}</span>
            <h1>${esc(lesson.title)}</h1>
            <p class="intro">${esc(lesson.summary)}</p>
            <div class="source-line">
              <span class="pill">${esc(lesson.source)}</span>
              <span class="pill">${lesson.pages} source pages</span>
              <span class="pill">${esc(lesson.by || "Converted study notes")}</span>
            </div>
          </div>
          <figure class="visual">
            ${visualSvg(lesson.visual, lesson.title)}
            <figcaption class="caption">${esc(lesson.visualCaption)}</figcaption>
          </figure>
        </header>

        <div class="layout">
          <aside class="side">
            <div class="panel">
              <h2>Lesson Map</h2>
              <ul class="toc">${sectionLinks}</ul>
            </div>
            <div class="panel">
              <h2>Source Flow</h2>
              <div class="page-flow">
                ${lesson.pageFlow.map(function (item) {
                  return `<div class="flow-item"><span>${esc(item.pages)}</span><p><strong>${esc(item.title)}</strong><br>${esc(item.detail)}</p></div>`;
                }).join("")}
              </div>
            </div>
          </aside>

          <main class="content">
            ${lesson.sections.map(function (section, sectionIndex) {
              return `<section class="section-card" id="section-${sectionIndex + 1}">
                <h2>${esc(section.title)}</h2>
                ${section.text ? `<p>${esc(section.text)}</p>` : ""}
                ${section.bullets ? `<ul>${section.bullets.map(function (bullet) { return `<li>${esc(bullet)}</li>`; }).join("")}</ul>` : ""}
                ${section.formula ? `<div class="formula">${esc(section.formula)}</div>` : ""}
              </section>`;
            }).join("")}

            <section class="section-card">
              <h2>Key Terms</h2>
              <div class="term-grid">
                ${lesson.terms.map(function (term) {
                  return `<div class="term"><strong>${esc(term.term)}</strong><p>${esc(term.meaning)}</p></div>`;
                }).join("")}
              </div>
            </section>

            <section class="check-card">
              <h2>Quick Check</h2>
              <div class="check-grid">
                ${lesson.checks.map(function (check, checkIndex) {
                  return `<div class="check"><strong>Check ${checkIndex + 1}</strong>${esc(check)}</div>`;
                }).join("")}
              </div>
            </section>

            <div class="nav-row">
              ${previous ? `<a href="#${esc(previous.slug)}">Previous: ${esc(previous.label)}</a>` : `<a href="./week-01-introduction-to-science-olympiad.html">Previous: Week 01</a>`}
              ${next ? `<a href="#${esc(next.slug)}">Next: ${esc(next.label)}</a>` : `<a href="./">Back to Hub</a>`}
            </div>
          </main>
        </div>
      `;
    }

    function render() {
      renderLesson(findLesson());
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
