<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tingxie Answer Pack</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #475569;
      --line: #d7deea;
      --accent: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #e5e7eb;
      color: var(--ink);
    }

    .toolbar {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 14px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .toolbar-title {
      font-weight: 700;
      color: #1e3a8a;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar a,
    .toolbar button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .toolbar .primary {
      background: #1d4ed8;
      color: #ffffff;
    }

    .toolbar .secondary {
      background: #ffffff;
      color: #1e3a8a;
      border: 1px solid rgba(29, 78, 216, 0.18);
    }

    .stage {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto 24px;
    }

    .sheet {
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
      border-radius: 10px;
      padding: 9mm;
    }

    .sheet-header {
      border-bottom: 2px solid #0f172a;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .answers-columns {
      columns: 2;
      column-gap: 12mm;
    }

    .set-answer {
      break-inside: avoid;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      margin: 0 0 10px;
    }

    .set-answer h2 {
      margin: 0 0 7px;
      font-size: 14px;
      line-height: 1.3;
      color: #1e3a8a;
    }

    .answer-list {
      display: grid;
      gap: 4px;
      font-size: 11px;
      line-height: 1.35;
    }

    .answer-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px;
      align-items: start;
    }

    .answer-row strong {
      color: #1e293b;
    }

    .answer-row span {
      min-width: 0;
      word-break: break-word;
    }

    .hint {
      color: var(--muted);
      font-size: 10px;
    }

    .empty-message {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      line-height: 1.65;
    }

    @page {
      size: A4;
      margin: 8mm;
    }

    @media print {
      body {
        background: #ffffff;
      }

      .toolbar {
        display: none;
      }

      .stage {
        width: auto;
        margin: 0;
      }

      .sheet {
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }
    }

    @media (max-width: 860px) {
      .answers-columns {
        columns: 1;
      }
    }
  </style>
</head>
<body data-page="answers">
  <header class="toolbar">
    <div class="toolbar-title" id="answersToolbarTitle">Compact Answer Pack</div>
    <div class="toolbar-actions">
      <a class="secondary" href="./">Back to editor</a>
      <button class="primary" id="printAnswersButton" type="button">Print answers</button>
    </div>
  </header>

  <main class="stage">
    <section class="sheet">
      <header class="sheet-header">
        <h1 class="title">Tingxie Answers</h1>
        <div class="subtitle" id="answersSubtitle">All sets in a compact printable layout</div>
      </header>
      <div class="answers-columns" id="answersColumns"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
