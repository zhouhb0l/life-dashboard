<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary Chinese Dictation - Student Worksheet</title>
  <style>
    @page {
      size: A4;
      margin: 16mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2933;
      background: #ffffff;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 18px 20px 28px;
    }

    .page-header {
      border-bottom: 2px solid #111827;
      padding-bottom: 12px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      color: #52606d;
    }

    .entry {
      padding: 14px 0 18px;
      border-bottom: 1px solid #d9e2ec;
      page-break-inside: avoid;
    }

    .entry:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .entry-head {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .entry-number {
      width: 34px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      flex: 0 0 auto;
    }

    .entry-meta {
      min-width: 0;
      flex: 1;
    }

    .pinyin {
      font-size: 23px;
      line-height: 1.35;
      font-weight: 600;
      color: #102a43;
    }

    .translation {
      margin-top: 4px;
      font-size: 17px;
      line-height: 1.45;
      color: #486581;
    }

    .write-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-left: 48px;
      min-height: 86px;
    }

    .write-box {
      width: 52px;
      height: 52px;
      border: 1.5px solid #9fb3c8;
      border-radius: 4px;
      background:
        linear-gradient(to right, transparent 49%, #d9e2ec 49%, #d9e2ec 51%, transparent 51%),
        linear-gradient(to bottom, transparent 49%, #d9e2ec 49%, #d9e2ec 51%, transparent 51%);
    }

    .answer-text {
      padding-left: 48px;
      font-size: 34px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: 0;
      color: #111827;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    @media print {
      .page {
        max-width: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1 class="title">Primary Chinese Dictation</h1>
      <div class="subtitle">Student Worksheet</div>
    </header>
    
    <section class="entry">
      <div class="entry-head">
        <div class="entry-number">1.</div>
        <div class="entry-meta">
          <div class="pinyin">xué xiào</div>
          <div class="translation">School</div>
        </div>
      </div>
      <div class="write-grid"><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span></div>
    </section>
    

    <section class="entry">
      <div class="entry-head">
        <div class="entry-number">2.</div>
        <div class="entry-meta">
          <div class="pinyin">lǎo shī</div>
          <div class="translation">teacher</div>
        </div>
      </div>
      <div class="write-grid"><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span></div>
    </section>
    

    <section class="entry">
      <div class="entry-head">
        <div class="entry-number">3.</div>
        <div class="entry-meta">
          <div class="pinyin">wǒ men yì qǐ xué xí</div>
          <div class="translation">We learn together.</div>
        </div>
      </div>
      <div class="write-grid"><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span></div>
    </section>
    

    <section class="entry">
      <div class="entry-head">
        <div class="entry-number">4.</div>
        <div class="entry-meta">
          <div class="pinyin">jīn tiān de tiān qì hěn hǎo</div>
          <div class="translation">The weather is very good today.</div>
        </div>
      </div>
      <div class="write-grid"><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span></div>
    </section>
    

    <section class="entry">
      <div class="entry-head">
        <div class="entry-number">5.</div>
        <div class="entry-meta">
          <div class="pinyin">qǐng nǐ bǎ zuò yè jiāo gěi lǎo shī</div>
          <div class="translation">Please give your homework to the teacher.</div>
        </div>
      </div>
      <div class="write-grid"><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span><span class="write-box" aria-hidden="true"></span></div>
    </section>
    
  </main>
</body>
</html>
